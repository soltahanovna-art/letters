<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Архив писем М. Еликпаева</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  display:flex;
  background:#b8aa88;
  font-family:"Courier New", monospace;
  color:#2b2418;
}

.leftPanel{
  width:170px;
  background:#2f2f2f;
  color:white;
  padding:18px;
}

.letterBtn{
  padding:15px 10px;
  margin-bottom:15px;
  cursor:pointer;
  text-align:center;
  border:1px solid #777;
  background:#3a3a3a;
  border-radius:4px;
  transition:.3s;
}

.letterBtn:hover,
.letterBtn.active{
  background:#5a0000;
  transform:scale(1.03);
}

.main{
  flex:1;
  padding:25px;
  overflow-y:auto;
}

.paper{
  background:#f6eed7;
  background-image:
    linear-gradient(transparent 96%, rgba(0,0,0,.04) 100%);
  min-height:90vh;
  padding:55px;
  line-height:1.9;
  font-size:17px;
  white-space:pre-wrap;
  box-shadow:0 0 25px rgba(0,0,0,.45);
  border:1px solid #9d8b63;
  position:relative;
  transform-origin:top center;
}

.paper:before{
  content:"АРХИВ";
  position:absolute;
  top:35px;
  right:45px;
  color:#8b0000;
  border:4px solid #8b0000;
  padding:8px 18px;
  font-size:34px;
  transform:rotate(-17deg);
  opacity:.25;
  font-weight:bold;
}

.paper:after{
  content:"СЕКРЕТНО";
  position:absolute;
  top:120px;
  left:70px;
  border:4px solid red;
  padding:10px;
  font-size:38px;
  color:red;
  opacity:.14;
  transform:rotate(-25deg);
}

.paper.opening{
  animation:openLetter .9s ease;
}

@keyframes openLetter{
  0%{
    opacity:0;
    transform:rotateX(80deg) translateY(-100px) scale(.8);
  }
  40%{
    opacity:1;
    transform:rotateX(-10deg) translateY(10px) scale(1.02);
  }
  100%{
    opacity:1;
    transform:rotateX(0) translateY(0) scale(1);
  }
}

.rightPanel{
  width:470px;
  background:#ddd0ad;
  padding:18px;
  overflow-y:auto;
  border-left:3px solid #6b5b3e;
}

.controls{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}

button{
  background:#3a2d1d;
  color:white;
  border:none;
  padding:9px 12px;
  cursor:pointer;
  border-radius:4px;
  font-family:"Courier New", monospace;
}

button:hover{
  background:#6b0000;
}

.symptom{
  background:#f6eed7;
  margin-bottom:10px;
  padding:12px;
  border-left:8px solid #555;
  box-shadow:0 0 5px rgba(0,0,0,.2);
  animation:symptomAppear .45s both;
}

@keyframes symptomAppear{
  from{
    opacity:0;
    transform:translateX(45px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}

.symptom label{
  cursor:pointer;
}

.symptom input{
  transform:scale(1.2);
  margin-right:8px;
}

.mark{
  padding:3px 5px;
  border-radius:4px;
  font-weight:bold;
  box-decoration-break:clone;
  -webkit-box-decoration-break:clone;
  animation:highlightEffect .8s;
}

@keyframes highlightEffect{
  0%{
    filter:brightness(2);
  }
  100%{
    filter:brightness(1);
  }
}

.color-reform{background:#ff6b6b99;border-bottom:3px solid #c0392b}
.color-national{background:#ffe66d99;border-bottom:3px solid #d68910}
.color-structure{background:#48dbfb99;border-bottom:3px solid #2471a3}
.color-querulant{background:#1dd1a199;border-bottom:3px solid #117864}
.color-persecution{background:#a29bfe99;border-bottom:3px solid #6c5ce7}
.color-emotion{background:#ff9ff399;border-bottom:3px solid #c2185b}
.color-dark{background:#b2bec399;border-bottom:3px solid #636e72}

.analysisBox{
  margin-top:20px;
  background:#f6eed7;
  border:2px solid #8b0000;
  padding:15px;
  box-shadow:0 0 8px rgba(0,0,0,.25);
}

.analysisBox.show{
  animation:analysisWindow .5s ease;
}

@keyframes analysisWindow{
  0%{
    opacity:0;
    transform:translateY(20px) scale(.9);
  }
  100%{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.analysisTitle{
  color:#8b0000;
  font-weight:bold;
  font-size:18px;
  margin-bottom:10px;
}

.analysisSection{
  margin-top:12px;
  padding:10px;
  background:rgba(255,255,255,.6);
  border-left:5px solid #8b0000;
}

.small{
  font-size:14px;
  opacity:.85;
}
</style>
</head>

async function openLetter(num, btn){
  currentLetter = num;

  document.querySelectorAll(".letterBtn").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");

  document.getElementById("letterTitle").innerText = letters[num].title;

  const paper = document.getElementById("paper");
  paper.classList.remove("opening");
  void paper.offsetWidth;
  paper.classList.add("opening");

  try{
    const response = await fetch(letters[num].file);
    let text = await response.text();
    text = prepareText(text, letters[num].symptoms);
    document.getElementById("letterText").innerHTML = text;
  }
  catch(e){
    document.getElementById("letterText").innerHTML =
      "Не найден файл " + letters[num].file + ". Создайте рядом с index.html файлы letter1.txt, letter2.txt, letter3.txt.";
  }

  renderSymptoms();
  resetAnalysis();
}

function prepareText(text, symptoms){
  let safe = escapeHtml(text);

  symptoms.forEach(symptom=>{
    symptom.quotes.forEach((quote, index)=>{
      const escapedQuote = escapeHtml(quote).trim();
      if(escapedQuote.length < 3) return;

      const spanId = symptom.id + "_" + index;

      safe = safe.replace(
        escapedQuote,
        `<span id="${spanId}" data-symptom="${symptom.id}">${escapedQuote}</span>`
      );
    });
  });

  return safe;
}

function renderSymptoms(){
  const box = document.getElementById("symptomList");
  box.innerHTML = "";

  letters[currentLetter].symptoms.forEach(symptom=>{
    const div = document.createElement("div");
    div.className = "symptom";
    div.style.borderLeftColor = getColor(symptom.color);

    div.innerHTML = `
      <label>
        <input type="checkbox" onchange="toggleSymptom('${symptom.id}', this.checked)">
        <b>${symptom.title}</b><br>
        <span class="small">${symptom.symptom}</span>
      </label>
    `;
    box.appendChild(div);
  });
}

function toggleSymptom(id, checked){
  const symptom = letters[currentLetter].symptoms.find(s=>s.id===id);
  const spans = document.querySelectorAll(`[data-symptom="${id}"]`);

  spans.forEach(span=>{
    if(checked){
      span.classList.add("mark");
      span.classList.add(symptom.color);
    }else{
      span.classList.remove("mark");
      span.classList.remove(symptom.color);
    }
  });

  if(checked){
    showAnalysis(symptom);
    if(spans.length>0){
      spans[0].scrollIntoView({behavior:"smooth", block:"center"});
    }
  }
}

function showAnalysis(symptom){
  const box = document.getElementById("analysisBox");

  box.innerHTML = `
    <div class="analysisTitle">${symptom.title}</div>

    <div class="analysisSection">
      <b>Симптом:</b><br>
      ${symptom.symptom}
    </div>

    <div class="analysisSection">
      <b>Цитата / тезис:</b><br>
      ${symptom.quotes.map(q=>"«"+q+"»").join("<br><br>")}
    </div>

    <div class="analysisSection">
      <b>Оценка историка:</b><br>
      ${symptom.historian}
    </div>

    <div class="analysisSection">
      <b>Оценка психиатра:</b><br>
      ${symptom.psychiatrist}
    </div>
  `;

  box.classList.remove("show");
  void box.offsetWidth;
  box.classList.add("show");
}

function resetAnalysis(){
  document.getElementById("analysisBox").innerHTML = `
    <div class="analysisTitle">Анализ симптома</div>
    <p>Выберите симптом справа.</p>
  `;
}

function showAll(){
  document.querySelectorAll('.symptom input').forEach(input=>{
    input.checked = true;
    input.dispatchEvent(new Event("change"));
  });
}

function clearAll(){
  document.querySelectorAll('.symptom input').forEach(input=>{
    input.checked = false;
    input.dispatchEvent(new Event("change"));
  });
  resetAnalysis();
}

function escapeHtml(text){
  return text
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function getColor(colorClass){
  const colors = {
    "color-reform":"#ff6b6b",
    "color-national":"#ffe66d",

    "color-querulant":"#1dd1a1",
    "color-persecution":"#a29bfe",
    "color-emotion":"#ff9ff3",
    "color-dark":"#b2bec3"
  };
  return colors[colorClass] || "#555";
}
